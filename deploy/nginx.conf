# Nginx config — đứng sau Cloudflare proxy mode "Flexible".
# CF cấp HTTPS cho user, CF→origin là HTTP (origin không cần cert).
#
# Setup:
#   1. CF dashboard: SSL/TLS → Overview → "Flexible"
#   2. CF dashboard: SSL/TLS → Edge Certificates → "Always Use HTTPS" = ON
#      (để CF auto-redirect user http→https, origin không cần lo)
#   3. Sửa server_name → domain thật
#   4. cp file này → /etc/nginx/sites-available/bugtrack
#      ln -s ... sites-enabled/
#      nginx -t && systemctl reload nginx
#   5. (Khuyến nghị) Firewall: chỉ cho phép port 80 từ IP Cloudflare
#      ufw allow from <CF range> to any port 80
#
# Khi nâng lên Full (Strict): xem comment cuối file.

# ====== Trust Cloudflare proxy IPs để lấy real client IP ======
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name bugtrack.example.com;

    # Khớp MAX_UPLOAD trong src/server.js (100MB — giới hạn CF free tier).
    client_max_body_size 100M;
    client_body_timeout 600s;
    proxy_request_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    # Báo cho app biết user đang dùng HTTPS (do CF terminate) — quan trọng nếu app generate link tuyệt đối.
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";

    # Basic auth (nội bộ team) — sinh: htpasswd -c /etc/nginx/.htpasswd admin
    # auth_basic "BugTrack Pro - Internal";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Uploads — cache 7 ngày. `^~` để override regex location bên dưới.
    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Static assets cache 1 giờ
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}

# ===== Khi nâng lên Full (Strict) =====
# 1. CF dashboard: SSL/TLS → Origin Server → Create Certificate
#    Lưu /etc/ssl/cloudflare/origin.pem + origin.key
# 2. CF dashboard: SSL/TLS → Overview → "Full (strict)"
# 3. Sửa file này:
#      listen 80; → listen 443 ssl; http2 on;
#      Thêm 2 dòng:
#        ssl_certificate     /etc/ssl/cloudflare/origin.pem;
#        ssl_certificate_key /etc/ssl/cloudflare/origin.key;
# 4. nginx -t && systemctl reload nginx
